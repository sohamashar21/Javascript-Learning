<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Slider</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta2/css/all.min.css"
  integrity="sha512-YWzhKL2whUzgiheMoBFwW8CKV4qpHQAEuvilg9FAn5VJUDwKZZxkJNuGM4XkWuk94WCrrwslk8yWNGmY1EduTA=="
  crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="slider-container">
    <div class="image-container">
      <img src="/ImageSlider/cat1.jpg" alt="cat 1"/>
      <img src="/ImageSlider/cat2.jpg" alt="cat 2"/>
      <img src="/ImageSlider/cat3.jpg" alt="cat 3"/>
      <img src="/ImageSlider/cat4.jpg" alt="cat 4"/>
      <img src="/ImageSlider/dog1.jpg" alt="dog 1"/>
    </div>
<i class="fa-solid fa-angles-left btn prev"></i>
<i class="fa-solid fa-angles-right btn next"></i>
  </div>
  <script src="script.js"></script>
</body>
</html>
