<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="wrapper">
    <h1>Number guessing game</h1>
    <p>Try and Guess number between 1 to 100.</p>
    <p>You have 10 attepts to guess the right number.</p>
    </br>

    <form class="form">
      <label for="guessField" id="guess">Guess a number</label>
      <input type="text" id="guessField" class="guessedInput">
      <input type="submit" id="submit" value="Submit guess" class="guessSubmit">
    </form>

    <div class="resultParse">
      <p>Previous Guess: <span class="guesses"></span></p>
      <p>Guesses Remaining: <span class="remaining">10</span></p>
      <p class="lowOrHigh"></p>
    </div>

  </div>
</body>
<script src="script.js"></script>

</html>
