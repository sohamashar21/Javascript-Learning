<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM</title>
</head>

<body style="background-color: rgb(34, 31, 31); color: white;">

</body>
<script>
  const div = document.createElement('div')
  console.log(div);
  div.className = "main"
  div.id = Math.round(Math.random() * 10 + 1)
  div.setAttribute("title", "generated title")
  div.style.backgroundColor = "green"
  div.style.padding = '20px'
  // div.innerText = "Soham ashar"  
  const addText = document.createTextNode("Soham Ashar")
  div.appendChild(addText)
  document.body.appendChild(div)

  const myH2 = document.createElement('h2')
  console.log(myH2);
  myH2.className = "para"
  myH2.id = Math.round(Math.random() * 10 + 1)
  myH2.setAttribute("title", "my title");
  myH2.style.backgroundColor = "cyan"
  myH2.style.color = "black"
  myH2.style.padding = "20px"

  const addH2 = document.createTextNode("Soham ashar")
  myH2.appendChild(addH2)
  document.body.appendChild(myH2)
</script>

</html>
